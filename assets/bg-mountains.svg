<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f4f9"/>
      <stop offset="0.4" stop-color="#cfe6ed"/>
      <stop offset="1" stop-color="#a8d4b8"/>
    </linearGradient>
    <linearGradient id="m-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fc4a3"/><stop offset="1" stop-color="#6a9a72"/>
    </linearGradient>
    <linearGradient id="m-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7aaa7e"/><stop offset="1" stop-color="#4a7a52"/>
    </linearGradient>
    <linearGradient id="m-near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a8a5e"/><stop offset="1" stop-color="#3a5a3e"/>
    </linearGradient>
    <linearGradient id="m-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d5a36"/><stop offset="1" stop-color="#2a4226"/>
    </linearGradient>
    <linearGradient id="tree-spring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8d490"/><stop offset="1" stop-color="#5a8a4a"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.18" cy="0.18" r="0.22">
      <stop offset="0" stop-color="#fff8e0" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff8e0" stop-opacity="0"/>
    </radialGradient>

    <style>
      <![CDATA[
      @keyframes drift-slow {
        from { transform: translateX(-30px); }
        to   { transform: translateX(30px); }
      }
      @keyframes drift-fast {
        from { transform: translateX(-50px); }
        to   { transform: translateX(50px); }
      }
      @keyframes sway-a {
        0%, 100% { transform: rotate(-1.2deg); }
        50%      { transform: rotate(1.2deg); }
      }
      @keyframes sway-b {
        0%, 100% { transform: rotate(1deg); }
        50%      { transform: rotate(-1deg); }
      }
      @keyframes sun-pulse {
        0%, 100% { opacity: 0.75; }
        50%      { opacity: 0.95; }
      }
      .clouds-1 { animation: drift-slow 60s ease-in-out infinite alternate; }
      .clouds-2 { animation: drift-fast 90s ease-in-out infinite alternate; }
      .tree { transform-box: fill-box; transform-origin: bottom center; }
      .sway-a { animation: sway-a 5.5s ease-in-out infinite; }
      .sway-b { animation: sway-b 6.5s ease-in-out infinite; }
      .sun { animation: sun-pulse 8s ease-in-out infinite; transform-origin: center; }
      @media (prefers-reduced-motion: reduce) {
        .clouds-1, .clouds-2, .sway-a, .sway-b, .sun { animation: none; }
      }
      ]]>
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  <circle class="sun" cx="340" cy="180" r="60" fill="#fff8e0" opacity="0.75"/>

  <g class="clouds-1" fill="#fff" opacity="0.55">
    <ellipse cx="900" cy="170" rx="140" ry="14"/>
    <ellipse cx="1700" cy="140" rx="110" ry="10"/>
  </g>
  <g class="clouds-2" fill="#fff" opacity="0.5">
    <ellipse cx="1400" cy="240" rx="160" ry="12"/>
    <ellipse cx="600" cy="260" rx="90" ry="9"/>
  </g>

  <path d="M0 580 L160 460 L320 520 L500 420 L680 500 L860 430 L1040 520 L1240 440 L1420 500 L1620 440 L1800 510 L1920 470 L1920 700 L0 700 Z" fill="url(#m-far)" opacity="0.85"/>
  <path d="M0 700 L160 600 L320 670 L500 560 L700 660 L880 580 L1060 670 L1260 580 L1460 670 L1660 590 L1860 660 L1920 620 L1920 800 L0 800 Z" fill="url(#m-mid)" opacity="0.92"/>
  <path d="M0 800 L140 700 L300 780 L480 680 L680 770 L860 700 L1060 780 L1260 700 L1460 780 L1660 700 L1860 780 L1920 740 L1920 900 L0 900 Z" fill="url(#m-near)"/>
  <path d="M0 900 L1920 900 L1920 1080 L0 1080 Z" fill="url(#m-front)"/>

  <g>
    <g class="tree sway-a" transform="translate(120 870)"><path d="M0 0 L0 -32 L-10 -32 L0 -52 L-8 -52 L4 -78 L16 -52 L8 -52 L18 -32 L8 -32 L8 0 Z" fill="#2a4226"/></g>
    <g class="tree sway-b" transform="translate(220 880)"><path d="M0 0 L0 -28 L-9 -28 L0 -46 L-7 -46 L4 -68 L15 -46 L8 -46 L17 -28 L8 -28 L8 0 Z" fill="#1a3318"/></g>
    <g class="tree sway-a" transform="translate(360 870)"><path d="M0 0 L0 -34 L-11 -34 L0 -56 L-9 -56 L4 -82 L17 -56 L8 -56 L19 -34 L8 -34 L8 0 Z" fill="#2a4226"/></g>
    <g class="tree sway-b" transform="translate(520 885)"><path d="M0 0 L0 -30 L-10 -30 L0 -48 L-8 -48 L4 -72 L16 -48 L8 -48 L18 -30 L8 -30 L8 0 Z" fill="url(#tree-spring)"/></g>
    <g class="tree sway-a" transform="translate(680 875)"><path d="M0 0 L0 -36 L-12 -36 L0 -58 L-10 -58 L4 -86 L18 -58 L8 -58 L20 -36 L8 -36 L8 0 Z" fill="#1a3318"/></g>
    <g class="tree sway-b" transform="translate(860 880)"><path d="M0 0 L0 -32 L-10 -32 L0 -52 L-8 -52 L4 -78 L16 -52 L8 -52 L18 -32 L8 -32 L8 0 Z" fill="url(#tree-spring)"/></g>
    <g class="tree sway-a" transform="translate(1020 870)"><path d="M0 0 L0 -34 L-11 -34 L0 -54 L-9 -54 L4 -82 L17 -54 L8 -54 L19 -34 L8 -34 L8 0 Z" fill="#2a4226"/></g>
    <g class="tree sway-b" transform="translate(1180 880)"><path d="M0 0 L0 -30 L-10 -30 L0 -48 L-8 -48 L4 -72 L16 -48 L8 -48 L18 -30 L8 -30 L8 0 Z" fill="#1a3318"/></g>
    <g class="tree sway-a" transform="translate(1340 875)"><path d="M0 0 L0 -34 L-11 -34 L0 -54 L-9 -54 L4 -82 L17 -54 L8 -54 L19 -34 L8 -34 L8 0 Z" fill="url(#tree-spring)"/></g>
    <g class="tree sway-b" transform="translate(1500 880)"><path d="M0 0 L0 -32 L-10 -32 L0 -52 L-8 -52 L4 -78 L16 -52 L8 -52 L18 -32 L8 -32 L8 0 Z" fill="#2a4226"/></g>
    <g class="tree sway-a" transform="translate(1680 870)"><path d="M0 0 L0 -36 L-12 -36 L0 -58 L-10 -58 L4 -86 L18 -58 L8 -58 L20 -36 L8 -36 L8 0 Z" fill="#1a3318"/></g>
    <g class="tree sway-b" transform="translate(1840 880)"><path d="M0 0 L0 -30 L-10 -30 L0 -48 L-8 -48 L4 -72 L16 -48 L8 -48 L18 -30 L8 -30 L8 0 Z" fill="url(#tree-spring)"/></g>
  </g>

  <g fill="#a8d490" opacity="0.7">
    <ellipse cx="200" cy="930" rx="80" ry="6"/>
    <ellipse cx="500" cy="950" rx="100" ry="7"/>
    <ellipse cx="800" cy="940" rx="90" ry="6"/>
    <ellipse cx="1200" cy="950" rx="110" ry="7"/>
    <ellipse cx="1600" cy="940" rx="100" ry="6"/>
  </g>
  <g fill="#f8c8d8" opacity="0.6">
    <circle cx="430" cy="945" r="3"/><circle cx="438" cy="950" r="3"/><circle cx="425" cy="952" r="3"/>
    <circle cx="780" cy="945" r="3"/><circle cx="788" cy="950" r="3"/><circle cx="773" cy="952" r="3"/>
    <circle cx="1130" cy="945" r="3"/><circle cx="1140" cy="950" r="3"/><circle cx="1125" cy="952" r="3"/>
  </g>
</svg>
